apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndt-platform
      component: frontend
  template:
    metadata:
      labels:
        app: ndt-platform
        component: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend 3001; do
                echo "Waiting for backend..."
                sleep 2
              done
              echo "Backend is ready!"
        - name: setup-nginx
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat > /etc/nginx/conf.d/download.conf <<'EOF'
              server {
                listen 3000;
                server_name _;

                location /files/ {
                  alias /data/clips/;
                  add_header Content-Disposition "attachment";
                  add_header Cache-Control "public, max-age=86400";
                }

                location / {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                  proxy_send_timeout 300s;
                }
              }
              EOF
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: clipped-rasters
              mountPath: /data/clips
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: frontend
          image: mehdino123/ndt-front:latest-main28
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: nextjs
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: BACKEND_URL
                  optional: true
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "6Gi"
              cpu: "6000m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: nginx-config
          emptyDir: {}
        - name: clipped-rasters
          persistentVolumeClaim:
            claimName: clipped-rasters-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: ndt-platform
    component: frontend