apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clipped-rasters-pvc
  namespace: ndt-platform
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clip-service
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: clip-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndt-platform
      component: clip-service
  template:
    metadata:
      labels:
        app: ndt-platform
        component: clip-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-04
      containers:
        - name: clip-service
          image: mehdino123/ndt-clip:latest-main14
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              name: http
          env:
            # GeoServer connection (reuses existing secrets)
            - name: GEOSERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: GEOSERVER_WMS_URL
            - name: GEOSERVER_USER
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GEOSERVER_USER
            - name: GEOSERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GEOSERVER_PASSWORD
            # Shared PVC for clipped rasters
            - name: OUTPUT_DIR
              value: "/data/clipped-rasters"
            - name: GEOSERVER_FILE_BASE
              value: "/opt/clipped-rasters"
            - name: GEOJSON_DIR
              value: "/app/geojson"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            # Shared volume for clipped rasters (read-write for clip-service)
            - name: clipped-rasters
              mountPath: /data/clipped-rasters
            # GeoServer data volume (read-only for accessing source rasters)
            - name: geoserver-data
              mountPath: /data
      volumes:
        - name: clipped-rasters
          persistentVolumeClaim:
            claimName: clipped-rasters-pvc
        - name: geoserver-data
          hostPath:
            path: /mnt/geoserver-data
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: clip-service
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: clip-service
spec:
  type: ClusterIP
  selector:
    app: ndt-platform
    component: clip-service
  ports:
    - name: http
      port: 3005
      targetPort: 3005