apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndt-platform
      component: backend
  template:
    metadata:
      labels:
        app: ndt-platform
        component: backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-04
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "Postgres is ready!"
      containers:
        - name: backend
          image: mehdino123/ndt-back:latest-main4
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_HOST
                  optional: true
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_NAME
            - name: DB_MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_MAX_CONNECTIONS
                  optional: true
            - name: DB_IDLE_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_IDLE_TIMEOUT
                  optional: true
            - name: DB_CONNECTION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: DB_CONNECTION_TIMEOUT
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: JWT_SECRET
            - name: GEOSERVER_REST_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: GEOSERVER_REST_URL
            - name: GEOSERVER_WMS_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: GEOSERVER_WMS_URL
            - name: GEOSERVER_USER
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GEOSERVER_USER
            - name: GEOSERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GEOSERVER_PASSWORD
            - name: EMAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: EMAIL_PORT
            - name: EMAIL_SECURE
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: EMAIL_SECURE
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: EMAIL_PASS
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: EMAIL_FROM
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: GOOGLE_CALLBACK_URL
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: MICROSOFT_CLIENT_SECRET
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: MICROSOFT_TENANT_ID
            - name: MICROSOFT_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: MICROSOFT_CALLBACK_URL
            # AI Configuration
            - name: AI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: AI_BASE_URL
            - name: AI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: AI_MODEL
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: AI_API_KEY
            - name: AI_APP_URL
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: AI_APP_URL
                  optional: true
            - name: AI_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: AI_APP_NAME
                  optional: true
            # Clipping microservice
            - name: CLIP_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: CLIP_SERVICE_URL
          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: geoserver-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: geoserver-data
          hostPath:
            path: /mnt/geoserver-data
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ndt-platform
  labels:
    app: ndt-platform
    component: backend
spec:
  type: ClusterIP
  selector:
    app: ndt-platform
    component: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
