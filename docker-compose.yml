version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: ndt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GeoServer
  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: ndt-geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8081:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/tiffs:/data/tiffs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/geoserver/web/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndt-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data/tiffs:/data/tiffs:ro
      - ./backend/ai-imgs:/app/ai-imgs
    environment:
      - DB_HOST=db
    - MODEL_NAME=nvidia/nemotron-nano-12b-v2-vl:free 
    depends_on:
      db:
        condition: service_healthy

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ndt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  geoserver_data: